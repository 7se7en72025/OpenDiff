version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: opendiff-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: opendiff
    volumes:
      - mongodb_data:/data/db
    networks:
      - opendiff

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opendiff-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/opendiff
      RUST_LOG: info
      PORT: 5000
    depends_on:
      - mongodb
    networks:
      - opendiff
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  opendiff:
    driver: bridge
